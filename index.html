<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Storyboard | Comic Generator</title>
    <!-- Using Tailwind CSS for rapid, modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .panel-fade-in {
            animation: fadeIn 0.8s ease-in-out forwards;
            opacity: 0;
        }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen flex flex-col items-center py-12 px-4">

    <div class="max-w-4xl w-full">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 mb-4">
                Infinite Storyboard
            </h1>
            <p class="text-gray-400 text-lg">Turn a single sentence into a 4-panel comic strip using the Pollinations API.</p>
        </div>

        <!-- Input Section -->
        <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 shadow-xl mb-12">
            <label for="conceptInput" class="block text-sm font-medium text-gray-400 mb-2">What happens in your comic?</label>
            <div class="flex flex-col sm:flex-row gap-4">
                <input 
                    type="text" 
                    id="conceptInput" 
                    class="flex-1 bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                    placeholder="e.g., A micro-class drone autonomously navigating a dense, neon-lit cyber city..."
                    onkeypress="if(event.key === 'Enter') generateComic()"
                >
                <button 
                    id="generateBtn"
                    onclick="generateComic()"
                    class="bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 px-8 rounded-lg transition-colors flex justify-center items-center gap-2"
                >
                    <span>Generate</span>
                </button>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="hidden flex-col items-center justify-center py-12">
            <div class="spinner mb-4"></div>
            <p id="loadingText" class="text-blue-400 font-medium animate-pulse">Drafting the storyboard...</p>
        </div>

        <!-- Comic Grid Output -->
        <div id="comicGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full">
            <!-- Images will be injected here -->
        </div>
    </div>

    <script>
        async function generateComic() {
            const conceptInput = document.getElementById('conceptInput');
            const generateBtn = document.getElementById('generateBtn');
            const loadingState = document.getElementById('loadingState');
            const loadingText = document.getElementById('loadingText');
            const comicGrid = document.getElementById('comicGrid');

            const concept = conceptInput.value.trim();
            if (!concept) return;

            // Reset UI
            comicGrid.innerHTML = '';
            loadingState.classList.remove('hidden');
            loadingState.classList.add('flex');
            generateBtn.disabled = true;
            generateBtn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                // STEP 1: Hit the Text API to get 4 specific image prompts
                loadingText.innerText = "Writing the script and panel descriptions...";
                
                // We use a strict prompt to force the LLM to output ONLY our delimiter-separated strings
                const instructionPrompt = \`Create a 4-panel comic strip about: "\${concept}". 
                Write exactly 4 detailed image generation prompts, one for each panel. 
                Do not include panel numbers, prefixes, or any conversational text. 
                Separate each prompt strictly with the sequence "|||".\`;
                
                const textResponse = await fetch(\`https://text.pollinations.ai/\${encodeURIComponent(instructionPrompt)}\`);
                const textData = await textResponse.text();

                // Parse the response
                let panels = textData.split('|||').map(p => p.trim()).filter(p => p.length > 10);
                
                // Fallback in case the LLM formatting gets weird
                if (panels.length < 4) {
                    panels = textData.split('\\n').map(p => p.trim()).filter(p => p.length > 10);
                }
                
                // Ensure we only process up to 4 panels
                panels = panels.slice(0, 4);

                if (panels.length === 0) throw new Error("Failed to generate panel descriptions.");

                // STEP 2: Hit the Image API for each panel simultaneously
                loadingText.innerText = "Drawing the panels... (This takes a few seconds)";
                
                // Create an array of HTML strings for the grid
                const panelElements = panels.map((panelPrompt, index) => {
                    // We append comic book style modifiers to the prompt to keep the art style consistent
                    const styledPrompt = \`\${panelPrompt}, high quality graphic novel art style, vibrant colors, clear outlines, comic book illustration\`;
                    
                    // Generate a random seed so we don't get cached images for similar prompts
                    const randomSeed = Math.floor(Math.random() * 100000);
                    const imageUrl = \`https://image.pollinations.ai/prompt/\${encodeURIComponent(styledPrompt)}?seed=\${randomSeed}&width=800&height=800&nologo=true\`;

                    return \`
                        <div class="bg-white p-2 rounded-xl shadow-2xl panel-fade-in" style="animation-delay: \${index * 0.2}s">
                            <div class="relative group overflow-hidden rounded-lg">
                                <!-- The Image -->
                                <img src="\${imageUrl}" alt="Panel \${index + 1}" class="w-full h-auto object-cover border-4 border-black" onload="this.parentElement.nextElementSibling.style.opacity = '1'">
                                
                                <!-- Panel Number Badge -->
                                <div class="absolute top-2 left-2 bg-yellow-400 text-black font-black text-xl px-3 py-1 border-2 border-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">
                                    \${index + 1}
                                </div>
                            </div>
                            <!-- Panel Description (Hidden by default, fades in) -->
                            <p class="text-gray-800 text-sm font-medium mt-3 px-2 pb-1 opacity-0 transition-opacity duration-500">
                                \${panelPrompt}
                            </p>
                        </div>
                    \`;
                });

                // Inject the generated HTML into the grid
                comicGrid.innerHTML = panelElements.join('');

            } catch (error) {
                console.error("Error generating comic:", error);
                comicGrid.innerHTML = \`<div class="col-span-1 md:col-span-2 text-center text-red-400 p-8 border border-red-900 rounded-xl bg-red-950/20">Something went wrong. Please try another concept.</div>\`;
            } finally {
                // Restore UI
                loadingState.classList.add('hidden');
                loadingState.classList.remove('flex');
                generateBtn.disabled = false;
                generateBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }
    </script>
</body>
</html>
